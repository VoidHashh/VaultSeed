name: Build

on:
  push:
    branches:
      - main
      - develop
      - 'release-**'
  workflow_dispatch:
    inputs:
      device:
        description: Device to build
        required: true
        default: maixpy_yahboom
        type: choice
        options:
          - maixpy_yahboom
          - maixpy_m5stickv
          - maixpy_amigo
          - maixpy_dock
          - maixpy_cube
          - maixpy_wonder_mv
          - maixpy_tzt
          - all

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Select devices
        id: set-matrix
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            device="${{ github.event.inputs.device }}"
            if [ "$device" = "all" ]; then
              echo 'matrix=["maixpy_yahboom","maixpy_m5stickv","maixpy_amigo","maixpy_dock","maixpy_cube","maixpy_wonder_mv","maixpy_tzt"]' >> "$GITHUB_OUTPUT"
            else
              echo "matrix=[\"$device\"]" >> "$GITHUB_OUTPUT"
            fi
          else
            echo 'matrix=["maixpy_yahboom"]' >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Remove unnecessary files
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.device }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.device }}-
            ${{ runner.os }}-buildx-
      - name: Build firmware image
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: DEVICE=${{ matrix.device }}
          push: true
          tags: localhost:5000/voidhashh/vaultseed-builder-${{ matrix.device }}:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
      - name: Extract firmware
        id: extract
        uses: shrink/actions-docker-extract@v3
        with:
          image: localhost:5000/voidhashh/vaultseed-builder-${{ matrix.device }}:latest
          path: /src/firmware/Kboot/build/.
      - name: Prepare artifact name
        id: artifact
        shell: bash
        run: |
          device_short="${{ matrix.device }}"
          device_short="${device_short#maixpy_}"
          echo "name=build-${device_short}" >> "$GITHUB_OUTPUT"
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          path: ${{ steps.extract.outputs.destination }}
          name: ${{ steps.artifact.outputs.name }}
      - name: Move cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          if [ -d /tmp/.buildx-cache-new ]; then
            mv /tmp/.buildx-cache-new /tmp/.buildx-cache
          fi
