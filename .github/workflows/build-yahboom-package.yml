name: Build Yahboom Package

on:
  workflow_dispatch:

jobs:
  build-yahboom:
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Remove unnecessary files
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-yahboom-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-yahboom-
      - name: Build for Yahboom
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: DEVICE=maixpy_yahboom
          push: true
          tags: localhost:5000/voidhashh/vaultseed-builder-yahboom:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
      - name: Extract firmware for Yahboom
        id: extract-yahboom
        uses: shrink/actions-docker-extract@v3
        with:
          image: localhost:5000/voidhashh/vaultseed-builder-yahboom:latest
          path: /src/firmware/Kboot/build/.
      - name: Assemble download package
        run: |
          mkdir -p package
          cp "${{ steps.extract-yahboom.outputs.destination }}/firmware.bin" package/
          cp "${{ steps.extract-yahboom.outputs.destination }}/kboot.kfpkg" package/
          cp firmware/Kboot/build/ktool.py package/
          cp tools/yahboom-package/* package/
          VERSION=$(grep -m 1 '^version = ' pyproject.toml | cut -d '"' -f 2)
          {
            echo "version=$VERSION"
            echo "ref=${GITHUB_REF_NAME}"
            echo "commit=${GITHUB_SHA}"
            echo "run_url=https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } > package/BUILD-INFO.txt
          sha256sum package/firmware.bin package/kboot.kfpkg > package/SHA256SUMS.txt
      - name: Upload Yahboom package
        uses: actions/upload-artifact@v4
        with:
          name: vaultseed-yahboom-package
          path: package
          retention-days: 14
      - name: Publish summary
        run: |
          {
            echo "## Yahboom package ready"
            echo ""
            echo "- Artifact: \`vaultseed-yahboom-package\`"
            echo "- Files: \`kboot.kfpkg\`, \`firmware.bin\`, \`ktool.py\`, flash scripts"
            echo "- Windows flash: \`flash-yahboom.cmd COM6\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Move cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          if [ -d /tmp/.buildx-cache-new ]; then
            mv /tmp/.buildx-cache-new /tmp/.buildx-cache
          fi
